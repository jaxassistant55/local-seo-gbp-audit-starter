name: Ready-to-pay Local SEO GBP Audit
description: Submit safe public inputs for the fixed-scope $175 local SEO and Google Business Profile audit
title: "Ready to pay: Local SEO GBP Audit"
labels:
  - paid-inquiry
  - ready-to-pay
  - needs-scope
body:
  - type: markdown
    attributes:
      value: |
        Use this form only when you want the fixed-scope Local SEO / GBP Audit and can provide authorized public or buyer-owned inputs.

        Price: $175 fixed scope. This public issue is not payment proof. Paid work starts only after scope is accepted and external payment proof exists through a seller-owned checkout, invoice, marketplace order, funded milestone, or payment request.

        Do not post private customer data, credentials, payment screenshots, API keys, or sensitive business files in this issue.
  - type: checkboxes
    id: scope_boundary
    attributes:
      label: Scope and payment boundary
      options:
        - label: I understand this issue is public and I will not post private or sensitive data here.
          required: true
        - label: I accept that the listed fixed-scope price is $175 before any extra custom work.
          required: true
        - label: I understand payment must happen through an external seller-owned route before paid work starts.
          required: true
        - label: I can provide authorized public or buyer-owned inputs for the audit.
          required: true
  - type: input
    id: business_name
    attributes:
      label: Business name
      description: Public business name only.
      placeholder: Example Business LLC
    validations:
      required: true
  - type: input
    id: service_area
    attributes:
      label: Service area
      description: City, region, or service area to review.
      placeholder: Austin, TX or remote US
    validations:
      required: true
  - type: input
    id: public_url
    attributes:
      label: Public website or profile URL
      description: Public website, Google Business Profile, or other public listing URL.
      placeholder: https://example.com
    validations:
      required: true
  - type: textarea
    id: services
    attributes:
      label: Primary services to emphasize
      description: List public service categories or keywords.
      placeholder: |
        - Emergency plumbing
        - Water heater repair
        - Drain cleaning
    validations:
      required: true
  - type: textarea
    id: competitors
    attributes:
      label: Public competitors or benchmark listings
      description: Optional public URLs or names. Do not include private notes.
      placeholder: |
        - https://competitor.example
        - Competitor Name
    validations:
      required: false
  - type: dropdown
    id: desired_turnaround
    attributes:
      label: Desired turnaround
      options:
        - Flexible, after payment proof
        - 2 business days after payment proof
        - 5 business days after payment proof
        - Need to discuss before payment
    validations:
      required: true
  - type: textarea
    id: acceptance_note
    attributes:
      label: Acceptance note
      description: Confirm the exact deliverable you want and any public-only constraints.
      placeholder: I want the fixed-scope audit with public-only inputs and a short prioritized action list.
    validations:
      required: true
